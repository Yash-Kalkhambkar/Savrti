spring:
  application:
    name: SAVRTI Plant Exchange API
  datasource:
    url: jdbc:h2:mem:plantdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

logging:
  level:
    com.savrti: DEBUG

app:
  jwt:
    secret: ${JWT_SECRET:savrti-plant-exchange-super-secret-key-2024}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
